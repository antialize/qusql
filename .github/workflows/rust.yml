name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  test_maria:
    runs-on: ubuntu-latest
    services:
      db:
        image: docker.io/mariadb:10.5
        env:
          MYSQL_ROOT_PASSWORD: test
          MYSQL_DATABASE: test
        ports:
          - 1235:3306
        volumes:
          - /dev/shm/mysql:/var/lib/mysql
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3
    steps:
    - uses: actions/checkout@v5
    - name: Build
      run: cargo check --all-features --all --verbose
    - name: Run tests
      run: cargo test --all-features --all --verbose
    - name: Build Rust MySQL examples
      run: cargo build -p qusql-mysql-type-notes -p qusql-mysql-type-books
    - name: Run qusql-mysql-type-notes example
      env:
        DATABASE_URL: mysql://root:test@127.0.0.1:1235/test
      run: |
        NOTE_ID=$(target/debug/notes add "CI test note" | grep -oP 'note #\K\d+')
        target/debug/notes list
        target/debug/notes pin "$NOTE_ID"
        target/debug/notes delete "$NOTE_ID"
    - name: Run qusql-mysql-type-books example
      env:
        DATABASE_URL: mysql://root:test@127.0.0.1:1235/test
      run: target/debug/books
  test_postgresql:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: --health-cmd="pg_isready -U postgres" --health-interval=10s --health-timeout=5s --health-retries=5
    steps:
      - uses: actions/checkout@v5
      - name: Build sqlx examples
        run: cargo build -p qusql-sqlx-type-notes -p qusql-sqlx-type-books
      - name: Run qusql-sqlx-type-notes example
        env:
          DATABASE_URL: postgres://postgres:test@localhost:5432/test
        run: |
          NOTE_ID=$(target/debug/notes add "CI test note" | grep -oP 'note #\K\d+')
          target/debug/notes list
          target/debug/notes pin "$NOTE_ID"
          target/debug/notes delete "$NOTE_ID"
      - name: Run qusql-sqlx-type-books example
        env:
          DATABASE_URL: postgres://postgres:test@localhost:5432/test
        run: target/debug/qusql_sqlx_type_books
  clippy_check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Run Clippy
        run: cargo clippy --all --all-features -- -D warnings
  format_check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Run Fmt
        run: cargo fmt --all --check
  ruff_check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install ruff
        run: pip install ruff
      - name: Check ruff format
        run: ruff format --check .
      - name: Check ruff lint (fix)
        run: ruff check --fix --diff .
  doc_check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Run Doc
        run: cargo  doc --all --all-features --no-deps
      - name: Check markdown rust examples
        run: python3 check.py
      - name: Check qusql-parse pub struct exports
        run: python3 qusql-parse/check_exports.py
      - name: Run type-test schema tests
        run: python3 type-test/test.py
      - name: Run parse-test MySQL tests
        run: cd parse-test && python3 test.py test-mysql --failures-only
      - name: Run parse-test PostgreSQL tests
        run: cd parse-test && python3 test.py test-postgresql --failures-only
      - name: Run qusql-parse-lint example
        run: cargo run -p qusql-parse-lint -- --warn-unquoted-identifiers --warn-none-capital-keywords examples/qusql-parse-lint/example.sql
      - name: Run qusql-type-check example
        run: |
          cargo run -p qusql-type-check -- examples/qusql-type-check/schema.sql \
            'SELECT `id`, `username`, `score`, `is_active` FROM `users` WHERE `id` = ?' \
            'INSERT INTO `posts` (`user_id`, `title`, `body`) VALUES (?, ?, ?)' \
            'UPDATE `users` SET `is_active` = ? WHERE `id` = ?' \
            'DELETE FROM `posts` WHERE `user_id` = ?'
  python_type_test:
    runs-on: ubuntu-latest
    services:
      db:
        image: docker.io/mariadb:10.5
        env:
          MYSQL_ROOT_PASSWORD: test
          MYSQL_DATABASE: test
        ports:
          - 1235:3306
        volumes:
          - /dev/shm/mysql:/var/lib/mysql
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3
    steps:
      - uses: actions/checkout@v5
      - name: Install Python dependencies
        run: pip install mysqlclient types-mysqlclient mypy
      - name: Install qusql-mysql-type
        run: pip install ./qusql-py-mysql-type
      - name: Build and install qusql-mysql-type-plugin
        run: pip install ./qusql-py-mysql-type-plugin
      - name: Run mypy type check
        run: cd qusql-py-mysql-type-test && mypy test.py
      - name: Run Python integration tests
        run: cd qusql-py-mysql-type-test && python test.py
      - name: Run mypy on qusql-py-mysql-type-notes example
        run: cd examples/qusql-py-mysql-type-notes && mypy main.py
      - name: Run mypy on qusql-py-mysql-type-books example
        run: cd examples/qusql-py-mysql-type-books && mypy main.py
      - name: Run qusql-py-mysql-type-notes example
        env:
          DATABASE_URL: mysql://root:test@127.0.0.1:1235/test
        run: |
          NOTE_ID=$(python examples/qusql-py-mysql-type-notes/main.py add "CI note" | grep -oP 'note #\K\d+')
          python examples/qusql-py-mysql-type-notes/main.py list
          python examples/qusql-py-mysql-type-notes/main.py pin "$NOTE_ID"
          python examples/qusql-py-mysql-type-notes/main.py delete "$NOTE_ID"
      - name: Run qusql-py-mysql-type-books example
        env:
          DATABASE_URL: mysql://root:test@127.0.0.1:1235/test
        run: python examples/qusql-py-mysql-type-books/main.py
